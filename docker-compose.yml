version: "3.1"

services:
  krayin-php-apache:
    build:
      args:
        container_project_path: /var/www/html/
        uid: 1519
        user: $USER
      context: .
      dockerfile: ./Dockerfile
    image: krayin-php-apache
    expose:
      - 80
    volumes:
      - /var/www/html/

  krayin-mysql:
    image: mysql:8.4.0-oraclelinux8
    environment:
      MYSQL_ROOT_HOST: "%"
      MYSQL_ROOT_PASSWORD: root
    expose:
      - 3306
    volumes:
      - ./.configs/mysql-data:/var/lib/mysql/

  krayin-redis:
    image: redis:6.2-alpine
    expose:
      - 6379
    command: redis-server --save 20 1 --loglevel warning
    volumes:
      - ./.configs/redis-data:/data

  krayin-phpmyadmin:
    image: phpmyadmin:latest
    environment:
      PMA_HOST: krayin-mysql
      PMA_USER: root
      PMA_PASSWORD: root
      UPLOAD_LIMIT: 512M
    expose:
      - 80

  krayin-nginx-auth:
    build:
      context: ./.configs/nginx/
      dockerfile_inline: |
        FROM nginx:alpine
        RUN apk add --no-cache apache2-utils
        COPY nginx.conf /etc/nginx/conf.d/default.conf
        COPY entrypoint.sh /entrypoint.sh
        RUN chmod +x /entrypoint.sh
        ENTRYPOINT ["/entrypoint.sh"]
    environment:
      AUTH_USERNAME: ${AUTH_USERNAME:-admin}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-admin123}
    expose:
      - 80
    depends_on:
      - krayin-phpmyadmin

  krayin-mailhog:
    image: mailhog/mailhog
    logging:
      # Disable saving logs.
      driver: 'none'
    expose:
      # SMTP server.
      - 1025
      - 8025
